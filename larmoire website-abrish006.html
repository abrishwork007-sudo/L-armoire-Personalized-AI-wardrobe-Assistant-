<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L'Armoire — Your Digital Wardrobe</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F5F0E8; --cream-dark: #EDE7D9; --cream-mid: #F0EAE0;
      --charcoal: #2C2B28; --charcoal-mid: #4A4845; --charcoal-light: #6E6C69;
      --gold: #B8962E; --gold-light: #D4AD47; --gold-pale: #E8D89A; --gold-mist: #F5EEC8;
      --white: #FDFBF7; --border: rgba(184,150,46,0.2); --border-strong: rgba(184,150,46,0.45);
      --sidebar-w: 72px; --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'Jost', sans-serif; --success: #4A7C59; --danger: #8B3A3A;
    }
    body { background: var(--cream); font-family: var(--font-sans); color: var(--charcoal); }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: var(--sidebar-w); background: var(--charcoal); display: flex; flex-direction: column; align-items: center; padding: 28px 0; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; gap: 0; }
    .sidebar-logo { font-family: var(--font-serif); font-size: 11px; letter-spacing: 0.3em; color: var(--gold-light); writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg); margin-bottom: 36px; font-weight: 300; text-transform: uppercase; }
    .sidebar-divider { width: 28px; height: 0.5px; background: var(--gold); opacity: 0.3; margin: 6px 0; }
    .nav-item { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 14px 0; cursor: pointer; transition: all 0.2s; border: none; background: none; color: rgba(245,240,232,0.45); position: relative; }
    .nav-item:hover { color: var(--gold-light); }
    .nav-item.active { color: var(--gold-light); }
    .nav-item.active::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 2px; height: 28px; background: var(--gold); border-radius: 0 2px 2px 0; }
    .nav-label { font-family: var(--font-sans); font-size: 7.5px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 300; }
    .nav-icon { font-size: 18px; line-height: 1; }
    .sidebar-bottom { margin-top: auto; }
    .main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; }
    .auth-page { min-height: 100vh; background: var(--charcoal); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .auth-bg { position: absolute; inset: 0; background: repeating-linear-gradient(45deg, transparent, transparent 60px, rgba(184,150,46,0.03) 60px, rgba(184,150,46,0.03) 61px); }
    .auth-card { background: var(--white); border: 0.5px solid var(--border-strong); padding: 56px 52px; width: 420px; position: relative; }
    .auth-card::before { content: ''; position: absolute; top: 8px; left: 8px; right: -8px; bottom: -8px; border: 0.5px solid rgba(184,150,46,0.2); pointer-events: none; }
    .brand-title { font-family: var(--font-serif); font-size: 42px; font-weight: 300; letter-spacing: 0.15em; color: var(--charcoal); text-align: center; margin-bottom: 4px; font-style: italic; }
    .brand-sub { font-family: var(--font-sans); font-size: 8.5px; letter-spacing: 0.45em; text-transform: uppercase; color: var(--gold); text-align: center; margin-bottom: 44px; font-weight: 300; }
    .auth-tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 32px; }
    .auth-tab { flex: 1; padding: 10px; text-align: center; font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 400; cursor: pointer; border: none; background: none; color: var(--charcoal-light); border-bottom: 1.5px solid transparent; margin-bottom: -0.5px; transition: all 0.2s; }
    .auth-tab.active { color: var(--charcoal); border-bottom-color: var(--gold); }
    .field-group { margin-bottom: 20px; }
    .field-label { display: block; font-family: var(--font-sans); font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--charcoal-light); margin-bottom: 8px; font-weight: 400; }
    .field-input { width: 100%; border: 0.5px solid rgba(44,43,40,0.25); background: var(--cream-mid); padding: 12px 16px; font-family: var(--font-sans); font-size: 14px; color: var(--charcoal); outline: none; transition: border-color 0.2s; font-weight: 300; }
    .field-input:focus { border-color: var(--gold); }
    .btn-gold { width: 100%; padding: 14px; background: var(--charcoal); color: var(--gold-light); border: none; font-family: var(--font-sans); font-size: 9.5px; letter-spacing: 0.3em; text-transform: uppercase; cursor: pointer; font-weight: 400; transition: all 0.25s; margin-top: 8px; }
    .btn-gold:hover { background: var(--gold); color: var(--charcoal); }
    .auth-error { font-family: var(--font-sans); font-size: 11px; color: var(--danger); margin-top: 12px; text-align: center; letter-spacing: 0.05em; }
    .page-header { padding: 36px 48px 0; border-bottom: 0.5px solid var(--border); margin-bottom: 40px; padding-bottom: 28px; display: flex; align-items: flex-end; justify-content: space-between; }
    .page-title { font-family: var(--font-serif); font-size: 32px; font-weight: 300; color: var(--charcoal); font-style: italic; letter-spacing: 0.04em; }
    .page-title-label { font-family: var(--font-sans); font-size: 8px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 6px; font-weight: 300; }
    .user-badge { font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--charcoal-light); font-weight: 300; }
    .gold-dot { color: var(--gold); margin-right: 6px; }
    .closet-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 28px; padding: 0 48px 40px; }
    .closet-col { display: flex; flex-direction: column; gap: 16px; }
    .col-header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 14px; border-bottom: 0.5px solid var(--border); }
    .col-title { font-family: var(--font-serif); font-size: 20px; font-weight: 400; color: var(--charcoal); letter-spacing: 0.06em; }
    .col-count { font-family: var(--font-sans); font-size: 9px; letter-spacing: 0.2em; color: var(--charcoal-light); font-weight: 300; text-transform: uppercase; }
    .add-btn { width: 36px; height: 36px; border: 0.5px solid var(--border-strong); background: var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; color: var(--gold); transition: all 0.2s; font-weight: 200; }
    .add-btn:hover { background: var(--gold); color: var(--white); border-color: var(--gold); }
    .garment-card { border: 0.5px solid var(--border); background: var(--white); cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
    .garment-card:hover { border-color: var(--gold-light); }
    .garment-card.selected { border-color: var(--gold); border-width: 1.5px; }
    .garment-card.selected::after { content: '✓'; position: absolute; top: 8px; right: 8px; width: 20px; height: 20px; background: var(--gold); color: var(--white); font-size: 10px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-family: var(--font-sans); }
    .garment-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; background: var(--cream-dark); }
    .garment-placeholder { width: 100%; aspect-ratio: 3/4; background: var(--cream-dark); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; color: var(--charcoal-light); }
    .garment-info { padding: 10px 12px; border-top: 0.5px solid var(--border); }
    .garment-name { font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.1em; color: var(--charcoal); font-weight: 400; text-transform: uppercase; margin-bottom: 2px; }
    .garment-color { font-family: var(--font-sans); font-size: 10px; color: var(--charcoal-light); font-weight: 300; }
    .validator-bar { padding: 20px 48px; background: var(--charcoal); display: flex; align-items: center; justify-content: space-between; position: sticky; bottom: 0; }
    .validator-selection { display: flex; gap: 24px; align-items: center; }
    .sel-item { display: flex; align-items: center; gap: 10px; }
    .sel-swatch { width: 28px; height: 28px; border: 0.5px solid rgba(245,240,232,0.2); border-radius: 2px; }
    .sel-label { font-family: var(--font-sans); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(245,240,232,0.5); font-weight: 300; }
    .sel-name { font-family: var(--font-sans); font-size: 12px; color: var(--cream); font-weight: 300; margin-top: 1px; }
    .check-btn { padding: 13px 32px; background: var(--gold); color: var(--charcoal); border: none; font-family: var(--font-sans); font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .check-btn:hover { background: var(--gold-light); }
    .check-btn:disabled { background: rgba(184,150,46,0.3); color: rgba(44,43,40,0.5); cursor: not-allowed; }
    .verdict-overlay { position: fixed; inset: 0; background: rgba(44,43,40,0.75); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .verdict-card { background: var(--white); width: 480px; padding: 52px 48px; border: 0.5px solid var(--border-strong); position: relative; animation: fadeUp 0.35s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .verdict-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 20px; margin-bottom: 24px; font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 500; }
    .verdict-badge.approved { background: rgba(74,124,89,0.1); color: var(--success); border: 0.5px solid rgba(74,124,89,0.3); }
    .verdict-badge.suggestion { background: rgba(184,150,46,0.1); color: var(--gold); border: 0.5px solid var(--border-strong); }
    .verdict-title { font-family: var(--font-serif); font-size: 28px; font-weight: 300; color: var(--charcoal); font-style: italic; margin-bottom: 16px; letter-spacing: 0.04em; }
    .verdict-text { font-family: var(--font-sans); font-size: 13px; color: var(--charcoal-light); line-height: 1.8; font-weight: 300; margin-bottom: 28px; }
    .verdict-tip { border-left: 2px solid var(--gold); padding: 12px 16px; background: var(--gold-mist); margin-bottom: 28px; }
    .verdict-tip p { font-family: var(--font-sans); font-size: 12px; color: var(--charcoal-mid); font-weight: 300; line-height: 1.7; }
    .close-verdict { width: 100%; padding: 13px; border: 0.5px solid var(--border-strong); background: none; color: var(--charcoal); font-family: var(--font-sans); font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
    .close-verdict:hover { background: var(--charcoal); color: var(--cream); }
    .body-page { padding: 0 48px 48px; }
    .upload-zone { border: 0.5px dashed var(--border-strong); padding: 60px 40px; text-align: center; background: var(--white); cursor: pointer; transition: all 0.2s; margin-bottom: 32px; position: relative; }
    .upload-zone:hover { border-color: var(--gold); background: var(--gold-mist); }
    .upload-icon { font-size: 36px; margin-bottom: 16px; opacity: 0.5; }
    .upload-title { font-family: var(--font-serif); font-size: 22px; font-weight: 300; color: var(--charcoal); font-style: italic; margin-bottom: 8px; }
    .upload-hint { font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--charcoal-light); font-weight: 300; }
    .scan-container { position: relative; width: 260px; margin: 0 auto 32px; }
    .scan-img { width: 100%; border: 0.5px solid var(--border); display: block; filter: grayscale(30%) contrast(1.05); }
    .scan-overlay { position: absolute; inset: 0; pointer-events: none; }
    .scan-line { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); animation: scanMove 2s ease-in-out infinite; }
    @keyframes scanMove { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
    .body-outline-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .scan-label { font-family: var(--font-sans); font-size: 8.5px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); text-align: center; margin-bottom: 32px; font-weight: 300; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    .body-results { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .result-card { background: var(--white); border: 0.5px solid var(--border); padding: 24px; }
    .result-label { font-family: var(--font-sans); font-size: 8px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); font-weight: 400; margin-bottom: 10px; }
    .result-value { font-family: var(--font-serif); font-size: 28px; font-weight: 400; color: var(--charcoal); font-style: italic; margin-bottom: 8px; }
    .result-desc { font-family: var(--font-sans); font-size: 11px; color: var(--charcoal-light); line-height: 1.7; font-weight: 300; }
    .fit-score-bar { height: 3px; background: var(--cream-dark); margin-top: 12px; border-radius: 2px; overflow: hidden; }
    .fit-score-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 1s ease; }
    .reco-list { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
    .reco-item { font-family: var(--font-sans); font-size: 11px; color: var(--charcoal-mid); font-weight: 300; padding-left: 12px; border-left: 1.5px solid var(--gold-pale); line-height: 1.5; }
    .daily-page { padding: 0 48px 48px; }
    .daily-hero { background: var(--charcoal); padding: 48px; margin-bottom: 32px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; align-items: end; }
    .look-slot { display: flex; flex-direction: column; gap: 10px; }
    .look-slot-label { font-family: var(--font-sans); font-size: 8px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(245,240,232,0.4); font-weight: 300; }
    .look-slot-img { aspect-ratio: 2/3; background: rgba(245,240,232,0.05); border: 0.5px solid rgba(184,150,46,0.2); display: flex; align-items: center; justify-content: center; color: rgba(245,240,232,0.2); font-size: 28px; }
    .look-slot-img img { width: 100%; height: 100%; object-fit: cover; }
    .look-empty { font-family: var(--font-sans); font-size: 10px; color: rgba(245,240,232,0.2); text-align: center; font-weight: 300; letter-spacing: 0.1em; }
    .daily-info { padding: 28px 0; }
    .daily-score-row { display: flex; gap: 24px; align-items: center; }
    .score-box { border: 0.5px solid var(--border-strong); padding: 16px 24px; text-align: center; }
    .score-num { font-family: var(--font-serif); font-size: 40px; font-weight: 300; color: var(--gold); font-style: italic; display: block; }
    .score-lbl { font-family: var(--font-sans); font-size: 8px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--charcoal-light); font-weight: 300; }
    .ai-loading { display: flex; align-items: center; gap: 8px; font-family: var(--font-sans); font-size: 11px; color: var(--gold); letter-spacing: 0.15em; font-weight: 300; }
    .ai-dot { width: 5px; height: 5px; background: var(--gold); border-radius: 50%; animation: dotPulse 1.2s ease-in-out infinite; }
    .ai-dot:nth-child(2) { animation-delay: 0.2s; }
    .ai-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse { 0%,80%,100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
    .settings-page { padding: 0 48px 48px; }
    .settings-section { margin-bottom: 36px; }
    .settings-section-title { font-family: var(--font-sans); font-size: 8.5px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); font-weight: 400; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 0.5px solid var(--border); }
    .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 0.5px solid var(--border); }
    .settings-key { font-family: var(--font-sans); font-size: 13px; color: var(--charcoal); font-weight: 300; }
    .settings-val { font-family: var(--font-sans); font-size: 12px; color: var(--charcoal-light); font-weight: 300; }
    .toggle { width: 36px; height: 20px; background: var(--cream-dark); border-radius: 10px; cursor: pointer; position: relative; border: 0.5px solid var(--border); transition: background 0.2s; }
    .toggle.on { background: var(--charcoal); }
    .toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 12px; height: 12px; border-radius: 50%; background: var(--gold); transition: left 0.2s; }
    .toggle.on::after { left: 19px; }
    .logout-btn { padding: 11px 24px; border: 0.5px solid rgba(139,58,58,0.4); background: none; color: var(--danger); font-family: var(--font-sans); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; font-weight: 400; margin-top: 20px; }
    .logout-btn:hover { background: var(--danger); color: var(--white); }
    .hidden-file { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef } = React;

    const DEMO_ITEMS = {
      tops: [
        { id: 1, name: "Ivory Silk Blouse", color: "Ivory / Cream", colorHex: "#F5F0E8", colorFamily: "neutral", img: null },
        { id: 2, name: "Noir Turtleneck", color: "Charcoal", colorHex: "#2C2B28", colorFamily: "neutral", img: null },
        { id: 3, name: "Blush Camisole", color: "Blush Pink", colorHex: "#E8C5B5", colorFamily: "warm", img: null },
        { id: 8, name: "Cobalt Print Blouse", color: "Electric Blue", colorHex: "#1B4FD8", colorFamily: "cool", clash: true, img: null },
      ],
      bottoms: [
        { id: 4, name: "Wide Leg Trousers", color: "Camel Beige", colorHex: "#C9A87C", colorFamily: "neutral", img: null },
        { id: 5, name: "Midi Slip Skirt", color: "Champagne", colorHex: "#E8D5A0", colorFamily: "neutral", img: null },
        { id: 9, name: "Lime Cargo Pants", color: "Neon Lime", colorHex: "#A8E63D", colorFamily: "cool", clash: true, img: null },
      ],
      shoes: [
        { id: 6, name: "Pointed Mule", color: "Sand Leather", colorHex: "#C4A882", colorFamily: "neutral", img: null },
        { id: 7, name: "Block Heel Pump", color: "Noir", colorHex: "#1A1A18", colorFamily: "neutral", img: null },
        { id: 10, name: "Patent Orange Mule", color: "Tangerine", colorHex: "#FF6B1A", colorFamily: "warm", clash: true, img: null },
      ],
    };

    function LArmoireApp() {
      const [authed, setAuthed] = useState(false);
      const [authTab, setAuthTab] = useState("login");
      const [authFields, setAuthFields] = useState({ name: "", id: "", pass: "", confirmPass: "" });
      const [authError, setAuthError] = useState("");
      const [users, setUsers] = useState([{ id: "admin", pass: "armoire", name: "Isabelle" }]);
      const [currentUser, setCurrentUser] = useState(null);
      const [page, setPage] = useState("closet");
      const [items, setItems] = useState(DEMO_ITEMS);
      const [selected, setSelected] = useState({ tops: null, bottoms: null, shoes: null });
      const [verdict, setVerdict] = useState(null);
      const [aiLoading, setAiLoading] = useState(false);
      const [bodyImg, setBodyImg] = useState(null);
      const [scanning, setScanning] = useState(false);
      const [scanDone, setScanDone] = useState(false);
      const [bodyResult, setBodyResult] = useState(null);
      const [fitScore, setFitScore] = useState(0);
      const [settings, setSettings] = useState({ notifications: true, aiSuggestions: true, publicProfile: false });
      const [dailyLoading, setDailyLoading] = useState(false);
      const [dailyResult, setDailyResult] = useState(null);
      const fileRef = useRef(null);
      const bodyFileRef = useRef(null);
      const [addingTo, setAddingTo] = useState(null);
      const [addName, setAddName] = useState("");
      const [addColor, setAddColor] = useState("");
      const [addImg, setAddImg] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);

      const handleAuth = () => {
        if (authTab === "login") {
          const user = users.find(u => u.id === authFields.id && u.pass === authFields.pass);
          if (!user) { setAuthError("Invalid credentials. Please try again."); return; }
          setCurrentUser(user); setAuthed(true);
        } else {
          if (!authFields.name || !authFields.id || !authFields.pass) { setAuthError("All fields are required."); return; }
          if (authFields.pass !== authFields.confirmPass) { setAuthError("Passwords do not match."); return; }
          if (users.find(u => u.id === authFields.id)) { setAuthError("This user ID is already taken."); return; }
          const newUser = { id: authFields.id, pass: authFields.pass, name: authFields.name };
          setUsers(prev => [...prev, newUser]); setCurrentUser(newUser); setAuthed(true);
        }
      };

      const handleSelectItem = (cat, item) => {
        setSelected(prev => ({ ...prev, [cat]: prev[cat]?.id === item.id ? null : item }));
      };

      const canCheck = selected.tops && selected.bottoms && selected.shoes;

      const analyseOutfit = (top, bottom, shoe) => {
        const clashCount = [top, bottom, shoe].filter(i => i.clash).length;
        const families = [top.colorFamily, bottom.colorFamily, shoe.colorFamily];
        const uniqueFamilies = new Set(families).size;
        const allNeutral = families.every(f => f === "neutral");
        const hasCoolWarmMix = families.includes("cool") && families.includes("warm");
        const multipleClash = clashCount >= 2;
        if (multipleClash || hasCoolWarmMix) {
          const clashNames = [top, bottom, shoe].filter(i => i.clash).map(i => i.name);
          const specific = clashNames.length
            ? `The ${clashNames.join(" and ")} introduce${clashNames.length === 1 ? "s" : ""} a temperature conflict — cool and warm tones pulling in opposite directions.`

        }
        return { type: "approved", title: "Elegant Cohesion", text: "Excellent tonal discipline. Your palette stays within a complementary range, lending an air of intentionality and quiet minimalism. The proportions balance beautifully.", tip: "Pro tip: A structured handbag in a mid-tone — cognac, taupe, or camel — would bridge the pieces and complete the silhouette.", score: 74 + Math.floor(Math.random() * 18) };

          reader.onload = () => res(reader.result.split(",")[1]);
          reader.onerror = () => rej(new Error("Read failed"));
          reader.readAsDataURL(f);
        });
        const mediaType = f.type || "image/jpeg";
        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514", max_tokens: 1000,
              messages: [{ role: "user", content: [
                { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },

              ]}]
            })

                    </div>
                  </div>
                </div>
                <div className="verdict-text">{verdict.text}</div>
                <div className="verdict-tip"><p>{verdict.tip}</p></div>
                <button className="close-verdict" onClick={() => setVerdict(null)}>Close ×</button>
              </div>
            </div>
          )}

          {showAddModal && (
            <div className="verdict-overlay" onClick={() => setShowAddModal(false)}>
              <div className="verdict-card" style={{ width: 400 }} onClick={e => e.stopPropagation()}>
                <div style={{ fontFamily: "var(--font-sans)", fontSize: 8.5, letterSpacing: "0.3em", textTransform: "uppercase", color: "var(--gold)", marginBottom: 6, fontWeight: 400 }}>Add to {addingTo}</div>
                <div className="verdict-title" style={{ marginBottom: 28, fontSize: 24 }}>New Piece</div>
                <div className="field-group">
                  <label className="field-label">Item Name</label>
                  <input className="field-input" placeholder="e.g. Silk Midi Dress" value={addName} onChange={e => setAddName(e.target.value)} />
                </div>
                <div className="field-group">
                  <label className="field-label">Color / Description</label>
                  <input className="field-input" placeholder="e.g. Champagne, Ivory" value={addColor} onChange={e => setAddColor(e.target.value)} />
                </div>
                <div className="field-group">
                  <label className="field-label">Photo (optional)</label>
                  <div className="upload-zone" style={{ padding: "24px 16px", marginBottom: 0 }} onClick={() => fileRef.current?.click()}>
                    {addImg
                      ? <img src={addImg} alt="preview" style={{ width: 80, height: 100, objectFit: "cover", display: "block", margin: "0 auto" }} />
                      : <><div className="upload-icon" style={{ fontSize: 22 }}>⬡</div><div className="upload-hint">Click to upload photo</div></>
                    }
                    <input ref={fileRef} type="file" className="hidden-file" accept="image/*" onChange={handleAddFile} />
                  </div>
                </div>
                <div style={{ display: "flex", gap: 12, marginTop: 8 }}>
                  <button className="close-verdict" style={{ flex: 1 }} onClick={() => setShowAddModal(false)}>Cancel</button>
                  <button className="btn-gold" style={{ flex: 1, marginTop: 0 }} onClick={handleAddItem}>Add Piece →</button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<LArmoireApp />);
  </script>
</body>
</html>
